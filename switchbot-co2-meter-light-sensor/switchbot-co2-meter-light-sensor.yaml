blueprint:
  name: SwitchBot CO2 Meter Indicator Light
  description: >
    Drives a single light to indicate CO2 level. The light colour reflects
    the CO2 zone (red = poor, amber = acceptable, green = good). A light
    sensor chooses between two brightness levels so the indicator is
    bright in daylight and dim at night.
  domain: automation

  input:
    co2_sensor:
      name: CO2 sensor
      description: The SwitchBot CO2 sensor entity that reports ppm.
      selector:
        entity:
          domain: sensor
          device_class: carbon_dioxide

    target_light:
      name: Indicator light
      description: The light to drive. Must support RGB colour.
      selector:
        entity:
          domain: light

    light_sensor:
      name: Ambient light sensor
      description: Illuminance sensor used to pick the brightness level.
      selector:
        entity:
          domain: sensor
          device_class: illuminance

    light_threshold:
      name: Ambient light threshold (lux)
      description: >
        At or above this value the "bright" brightness is used.
        Below it, the "dim" brightness is used.
      default: 50
      selector:
        number:
          min: 0
          max: 10000
          step: 1
          unit_of_measurement: lx
          mode: box

    brightness_bright:
      name: Brightness when bright (%)
      default: 100
      selector:
        number:
          min: 1
          max: 100
          step: 1
          unit_of_measurement: "%"
          mode: slider

    brightness_dim:
      name: Brightness when dim (%)
      default: 20
      selector:
        number:
          min: 1
          max: 100
          step: 1
          unit_of_measurement: "%"
          mode: slider

    trigger_mode:
      name: Trigger mode
      description: >
        "value_change" triggers whenever the sensor reports a new value.
        "periodic" triggers at a fixed interval regardless of value changes.
      default: value_change
      selector:
        select:
          options:
            - value_change
            - periodic

    trigger_interval:
      name: Trigger interval (seconds)
      description: How often to check the CO2 level when trigger mode is "periodic".
      default: 30
      selector:
        number:
          min: 5
          max: 3600
          step: 5
          unit_of_measurement: seconds
          mode: box

    high_threshold:
      name: High threshold (ppm)
      description: CO2 level above which the light turns red (Poor).
      default: 1400
      selector:
        number:
          min: 400
          max: 5000
          step: 50
          unit_of_measurement: ppm
          mode: box

    low_threshold:
      name: Low threshold (ppm)
      description: CO2 level below which the light turns green (Good).
      default: 1000
      selector:
        number:
          min: 400
          max: 5000
          step: 50
          unit_of_measurement: ppm
          mode: box

mode: single

variables:
  sensor_entity: !input co2_sensor
  light_entity: !input light_sensor
  light_thr: !input light_threshold
  bright_pct: !input brightness_bright
  dim_pct: !input brightness_dim
  high: !input high_threshold
  low: !input low_threshold
  mode: !input trigger_mode
  interval: !input trigger_interval

trigger:
  - platform: state
    entity_id: !input co2_sensor
    id: value_change

  - platform: time_pattern
    seconds: "/1"
    id: periodic

condition:
  - condition: template
    value_template: >
      {% if trigger.id == 'value_change' %}
        {{ mode == 'value_change' }}
      {% else %}
        {{ mode == 'periodic' and
           (state_attr(this.entity_id, 'last_triggered') is none or
            (now() - state_attr(this.entity_id, 'last_triggered')).total_seconds() >= interval) }}
      {% endif %}

action:
  - variables:
      co2: "{{ states(sensor_entity) | float(0) }}"
      rgb: >-
        {%- set v = states(sensor_entity) | float(0) -%}
        {%- if v > (high | float) -%}[255, 0, 0]
        {%- elif v < (low | float) -%}[0, 255, 0]
        {%- else -%}[255, 191, 0]
        {%- endif -%}
      brightness: >-
        {%- if (states(light_entity) | float(0)) >= (light_thr | float) -%}
        {{ bright_pct }}
        {%- else -%}
        {{ dim_pct }}
        {%- endif -%}
  - service: light.turn_on
    target:
      entity_id: !input target_light
    data:
      rgb_color: "{{ rgb }}"
      brightness_pct: "{{ brightness | int }}"
