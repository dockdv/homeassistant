blueprint:
  name: SwitchBot CO2 Meter
  description: >
    Monitors a SwitchBot CO2 sensor and triggers actions based on three zones:
    above a high threshold, below a low threshold, or within the range
    between the two thresholds. Can trigger on every sensor value change
    or on a periodic interval.
  domain: automation

  input:
    co2_sensor:
      name: CO2 sensor
      description: The SwitchBot CO2 sensor entity that reports ppm.
      selector:
        entity:
          domain: sensor
          device_class: carbon_dioxide

    trigger_mode:
      name: Trigger mode
      description: >
        "value_change" triggers whenever the sensor reports a new value.
        "periodic" triggers at a fixed interval regardless of value changes.
      default: value_change
      selector:
        select:
          options:
            - value_change
            - periodic

    trigger_interval:
      name: Trigger interval (seconds)
      description: How often to check the CO2 level when trigger mode is "periodic".
      default: 30
      selector:
        number:
          min: 5
          max: 3600
          step: 5
          unit_of_measurement: seconds
          mode: box

    high_threshold:
      name: High threshold (ppm)
      description: CO2 level above which the "above high" action is triggered.
      default: 1400
      selector:
        number:
          min: 400
          max: 5000
          step: 50
          unit_of_measurement: ppm
          mode: box

    low_threshold:
      name: Low threshold (ppm)
      description: CO2 level below which the "below low" action is triggered.
      default: 1000
      selector:
        number:
          min: 400
          max: 5000
          step: 50
          unit_of_measurement: ppm
          mode: box

    action_above_high:
      name: Action when above high threshold (Poor)
      description: Runs when CO2 rises above the high threshold (e.g. turn on ventilation).
      default: []
      selector:
        action: {}

    action_below_low:
      name: Action when below low threshold (Good)
      description: Runs when CO2 drops below the low threshold.
      default: []
      selector:
        action: {}

    action_within_range:
      name: Action when within range (Acceptable)
      description: Runs when CO2 is between the low and high thresholds.
      default: []
      selector:
        action: {}

mode: single

variables:
  sensor_entity: !input co2_sensor
  high: !input high_threshold
  low: !input low_threshold
  mode: !input trigger_mode

trigger:
  - platform: state
    entity_id: !input co2_sensor
    id: value_change

  - platform: time_pattern
    seconds: !input trigger_interval
    id: periodic

condition:
  - condition: template
    value_template: "{{ trigger.id == mode }}"

action:
  - variables:
      co2: "{{ states(sensor_entity) | float(0) }}"
  - choose:
      - conditions: "{{ co2 > high }}"
        sequence: !input action_above_high

      - conditions: "{{ co2 < low }}"
        sequence: !input action_below_low

      - conditions: "{{ co2 >= low and co2 <= high }}"
        sequence: !input action_within_range
